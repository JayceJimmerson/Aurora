<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Aurora{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
  <style>
    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ───────────────────────────────────────────── */
    :root {
      --bg:          #0a0f14;
      --surface:     #111820;
      --surface-alt: #19232f;
      --border:      #243040;
      --text:        #dde6f0;
      --muted:       #7a94aa;
      --accent:      #34d399;
      --radius:      8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;

      /* Status colours */
      --quiet:     #34d399;
      --unsettled: #fbbf24;
      --storm:     #f97316;
      --severe:    #f87171;
    }

    /* ── Base ────────────────────────────────────────────────────── */
    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    code {
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.875em;
    }

    /* ── Navbar ──────────────────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(17, 24, 32, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
    }

    .navbar-brand {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .navbar-brand:hover { text-decoration: none; color: var(--accent); }

    /* ── Layout ──────────────────────────────────────────────────── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* ── Page header ─────────────────────────────────────────────── */
    .page-header { margin-bottom: 1.75rem; }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    /* ── Badges ──────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      vertical-align: middle;
    }

    .badge-meta {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .badge-quiet {
      background: rgba(52,211,153,.12);
      border: 1px solid rgba(52,211,153,.3);
      color: var(--quiet);
    }

    .badge-unsettled {
      background: rgba(251,191,36,.12);
      border: 1px solid rgba(251,191,36,.3);
      color: var(--unsettled);
    }

    .badge-storm {
      background: rgba(249,115,22,.12);
      border: 1px solid rgba(249,115,22,.3);
      color: var(--storm);
    }

    .badge-severe {
      background: rgba(248,113,113,.12);
      border: 1px solid rgba(248,113,113,.3);
      color: var(--severe);
    }

    /* ── Stat chip ───────────────────────────────────────────────── */
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 100px;
    }

    .stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
    }

    /* ── Score bar ───────────────────────────────────────────────── */
    .score-bar-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .score-bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface-alt);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--quiet), var(--unsettled), var(--storm), var(--severe));
    }

    .score-label {
      font-size: 0.8rem;
      font-weight: 700;
      min-width: 2.75rem;
      text-align: right;
    }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.8rem 0;
    }

    /* ── Back link ───────────────────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .back-link:hover { color: var(--accent); text-decoration: none; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      color: var(--muted);
    }

    .empty-icon {
      display: block;
      font-size: 3.5rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .page-title { font-size: 1.4rem; }
      .container  { padding: 1.5rem 1rem 4rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <span>🌌</span> Aurora
  </a>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
